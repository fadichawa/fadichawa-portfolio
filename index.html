<style>
  :root{
    --bg:#060814;
    --bg2:#0a1020;
    --bg3:#10192d;
    --card:rgba(255,255,255,0.06);
    --card-strong:rgba(255,255,255,0.09);
    --text:#f4f7ff;
    --muted:#b5bfd3;
    --line:rgba(255,255,255,0.10);
    --accent:#7c5cff;
    --accent2:#25d0ff;
    --accent3:#6effc6;
    --shadow:0 20px 50px rgba(0,0,0,0.35);
    --max:1200px;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:Arial, Helvetica, sans-serif;
    color:var(--text);
    line-height:1.6;
    background:
      radial-gradient(circle at top left, rgba(124,92,255,0.20), transparent 30%),
      radial-gradient(circle at top right, rgba(37,208,255,0.18), transparent 28%),
      radial-gradient(circle at bottom center, rgba(110,255,198,0.10), transparent 30%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 45%, var(--bg3) 100%);
    min-height:100vh;
    overflow-x:hidden;

    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:38px 38px;
    mask-image:linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 85%);
    pointer-events:none;
    z-index:-1;
  }

  a{text-decoration:none;color:inherit}
  img{
    display:block;
    max-width:100%;
    -webkit-user-drag:none;
    user-drag:none;
    -webkit-user-select:none;
    user-select:none;
  }

  .container{
    width:min(92%, var(--max));
    margin:auto;
  }

  header{
    position:sticky;
    top:0;
    z-index:1000;
    background:rgba(6,8,20,0.72);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }

  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    padding:18px 0;
  }

  .brand{
    font-size:1.15rem;
    font-weight:700;
    letter-spacing:.5px;
  }

  .brand span{
    background:linear-gradient(90deg,var(--accent2),var(--accent3));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    color:transparent;
  }

  nav ul{
    list-style:none;
    display:flex;
    gap:22px;
    flex-wrap:wrap;
  }

  nav a{
    color:var(--muted);
    font-size:.95rem;
    transition:.25s ease;
  }

  nav a:hover{color:var(--text)}

  section{padding:84px 0}

  .hero{
    padding:88px 0 60px;
  }

  .hero-grid{
    display:grid;
    grid-template-columns:1.25fr .75fr;
    gap:32px;
    align-items:center;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:10px;
    border:1px solid rgba(37,208,255,0.22);
    background:rgba(37,208,255,0.08);
    color:#bdf3ff;
    padding:9px 14px;
    border-radius:999px;
    margin-bottom:18px;
    font-size:.9rem;
  }

  .eyebrow::before{
    content:"";
    width:9px;
    height:9px;
    border-radius:50%;
    background:linear-gradient(90deg,var(--accent2),var(--accent3));
    box-shadow:0 0 14px rgba(37,208,255,0.6);
  }

  h1{
    font-size:3.2rem;
    line-height:1.1;
    margin-bottom:18px;
    max-width:820px;
  }

  .hero p{
    color:var(--muted);
    font-size:1.06rem;
    max-width:760px;
    margin-bottom:24px;
  }

  .btns{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-top:10px;
  }

  .btn{
    display:inline-block;
    padding:13px 20px;
    border-radius:14px;
    font-weight:700;
    transition:.25s ease;
    border:1px solid transparent;
  }

  .btn-primary{
    color:#051018;
    background:linear-gradient(90deg,var(--accent2),var(--accent3));
    box-shadow:0 10px 30px rgba(37,208,255,0.18);
  }

  .btn-primary:hover{transform:translateY(-2px)}

  .btn-secondary{
    border-color:var(--line);
    background:rgba(255,255,255,0.04);
    color:var(--text);
  }

  .btn-secondary:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,0.07);
  }

  .glass{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:24px;
    backdrop-filter:blur(16px);
    box-shadow:var(--shadow);
  }

  .profile-card{
    padding:28px;
    position:relative;
    overflow:hidden;
  }

  .profile-card::after{
    content:"";
    position:absolute;
    inset:auto -40px -40px auto;
    width:140px;
    height:140px;
    background:radial-gradient(circle, rgba(124,92,255,0.35), transparent 70%);
    pointer-events:none;
  }

  .profile-card img{
    width:210px;
    height:210px;
    margin:0 auto 18px;
    border-radius:50%;
    object-fit:cover;
    object-position:center 18%;
    border:4px solid rgba(255,255,255,0.12);
    box-shadow:0 16px 35px rgba(0,0,0,0.35);
    background:rgba(255,255,255,0.04);
    pointer-events:none;
  }

  .profile-card h3{
    text-align:center;
    margin-bottom:6px;
    font-size:1.45rem;
  }

  .profile-card .role,
  .profile-card .location{
    text-align:center;
    color:var(--muted);
  }

  .profile-card .location{margin-bottom:18px}

  .mini-stats{
    display:grid;
    gap:12px;
    margin-top:12px;
  }

  .mini-stats div{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:14px 16px;
  }

  .mini-stats strong{
    display:block;
    font-size:1.15rem;
    margin-bottom:3px;
  }

  .mini-stats span{
    color:var(--muted);
    font-size:.94rem;
  }

  .title{
    font-size:2.1rem;
    margin-bottom:12px;
  }

  .subtitle{
    color:var(--muted);
    max-width:850px;
    margin-bottom:32px;
  }

  .grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
  }

  .grid-3{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:22px;
  }

  .card{
    padding:24px;
    transition:.25s ease;
  }

  .card:hover{
    transform:translateY(-4px);
    background:var(--card-strong);
  }

  .card h3,.card h4{
    margin-bottom:12px;
  }

  .card p{
    color:var(--muted);
  }

  .tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
  }

  .tags span{
    padding:8px 12px;
    border-radius:999px;
    font-size:.84rem;
    color:#d5f8ff;
    background:rgba(37,208,255,0.10);
    border:1px solid rgba(37,208,255,0.18);
  }

  .achievement-list{
    list-style:none;
    display:grid;
    gap:14px;
  }

  .achievement-list li{
    padding:18px 20px;
    border-radius:18px;
    color:var(--muted);
    background:var(--card);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
  }

  .achievement-list strong{color:var(--text)}

  .project-card{
    overflow:hidden;
    transition:.25s ease;
  }

  .project-card:hover{
    transform:translateY(-5px);
    background:var(--card-strong);
  }

  .project-image{
    height:220px;
    border-radius:18px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
    margin-bottom:18px;
    background:linear-gradient(135deg, rgba(124,92,255,0.18), rgba(37,208,255,0.12));
    position:relative;
  }

  .project-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    transition:transform .35s ease;
    background:rgba(255,255,255,0.04);
    pointer-events:none;
  }

  .project-card:hover .project-image img{
    transform:scale(1.04);
  }

  .project-card h3{
    margin-bottom:10px;
    font-size:1.14rem;
  }

  .project-card p{
    color:var(--muted);
  }

  .cert-slider-wrap{
    position:relative;
  }

  .cert-slider{
    overflow:hidden;
    border-radius:24px;
  }

  .cert-track{
    display:flex;
    transition:transform .5s ease;
  }

  .cert-slide{
    min-width:100%;
    padding:8px;
  }

  .cert-card{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    align-items:center;
    padding:24px;
    min-height:420px;
  }

  .cert-image{
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.10);
    background:rgba(255,255,255,0.03);
    min-height:320px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  .cert-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    min-height:320px;
    pointer-events:none;
  }

  .cert-image::after{
    content:"© Fadi Chawa";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2rem;
    font-weight:700;
    color:rgba(255,255,255,0.15);
    text-transform:uppercase;
    letter-spacing:4px;
    transform:rotate(-28deg);
    pointer-events:none;
    z-index:2;
    text-shadow:0 2px 8px rgba(0,0,0,0.25);
  }

  .cert-info h3{
    font-size:1.45rem;
    margin-bottom:12px;
  }

  .cert-info p{
    color:var(--muted);
    font-size:1rem;
    margin-bottom:14px;
  }

  .cert-info .issuer{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    font-size:.86rem;
    color:#d5f8ff;
    background:rgba(37,208,255,0.10);
    border:1px solid rgba(37,208,255,0.18);
    margin-bottom:14px;
  }

  .cert-counter{
    color:var(--muted);
    font-size:.95rem;
    margin-top:12px;
  }

  .slider-controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-top:20px;
    flex-wrap:wrap;
  }

  .slider-btn{
    border:1px solid var(--line);
    background:rgba(255,255,255,0.05);
    color:var(--text);
    padding:12px 18px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
    transition:.25s ease;
    pointer-events:auto;
  }

  .slider-btn:hover{
    background:rgba(255,255,255,0.10);
    transform:translateY(-2px);
  }

  .slider-dots{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
  }

  .dot{
    width:11px;
    height:11px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.25);
    transition:.25s ease;
    pointer-events:auto;
  }

  .dot.active{
    background:linear-gradient(90deg,var(--accent2),var(--accent3));
    transform:scale(1.15);
    box-shadow:0 0 12px rgba(37,208,255,0.4);
  }

  .contact-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
  }

  .contact-links a{
    display:inline-block;
    margin-right:14px;
    margin-bottom:10px;
    color:#c6f8ff;
    font-weight:700;
    pointer-events:auto;
  }

  .contact-links a:hover{
    text-decoration:underline;
  }

  footer{
    border-top:1px solid var(--line);
    padding:28px 0 40px;
    text-align:center;
    color:var(--muted);
    background:rgba(0,0,0,0.10);
  }

  @media (max-width: 980px){
    .hero-grid,
    .grid-2,
    .grid-3,
    .contact-grid,
    .cert-card{
      grid-template-columns:1fr;
    }

    .nav{
      flex-direction:column;
    }

    nav ul{
      justify-content:center;
    }

    h1{
      font-size:2.3rem;
    }

    .profile-card img{
      width:180px;
      height:180px;
    }

    .cert-card{
      min-height:auto;
    }

    .cert-image img{
      min-height:240px;
    }

    .cert-image::after{
      font-size:1.3rem;
      letter-spacing:2px;
    }
  }
</style>
