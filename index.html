<script>
  const track = document.getElementById('certTrack');
  const slides = document.querySelectorAll('.cert-slide');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const dotsContainer = document.getElementById('sliderDots');

  let currentIndex = 0;

  slides.forEach((_, index) => {
    const dot = document.createElement('button');
    dot.classList.add('dot');
    if(index === 0) dot.classList.add('active');
    dot.addEventListener('click', () => goToSlide(index));
    dotsContainer.appendChild(dot);
  });

  const dots = document.querySelectorAll('.dot');

  function updateSlider() {
    track.style.transform = `translateX(-${currentIndex * 100}%)`;
    dots.forEach(dot => dot.classList.remove('active'));
    dots[currentIndex].classList.add('active');
  }

  function goToSlide(index) {
    currentIndex = index;
    updateSlider();
  }

  function nextSlide() {
    currentIndex = (currentIndex + 1) % slides.length;
    updateSlider();
  }

  function prevSlide() {
    currentIndex = (currentIndex - 1 + slides.length) % slides.length;
    updateSlider();
  }

  nextBtn.addEventListener('click', nextSlide);
  prevBtn.addEventListener('click', prevSlide);

  setInterval(nextSlide, 5000);

  // Disable right click
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });

  // Disable dragging
  document.addEventListener('dragstart', function(e) {
    e.preventDefault();
  });

  // Disable copy, cut, paste, select
  ['copy', 'cut', 'paste', 'selectstart'].forEach(function(evt) {
    document.addEventListener(evt, function(e) {
      e.preventDefault();
    });
  });

  // Disable common keys
  document.addEventListener('keydown', function(e) {
    const key = e.key.toLowerCase();

    if (e.key === 'F12') {
      e.preventDefault();
      return false;
    }

    if (e.ctrlKey && e.shiftKey && ['i', 'j', 'c', 's'].includes(key)) {
      e.preventDefault();
      return false;
    }

    if (e.ctrlKey && ['u', 's', 'p', 'c', 'a', 'x'].includes(key)) {
      e.preventDefault();
      return false;
    }

    if (e.metaKey && e.shiftKey && ['i', 'j', 'c', 's'].includes(key)) {
      e.preventDefault();
      return false;
    }

    if (e.metaKey && ['u', 's', 'p', 'c', 'a', 'x'].includes(key)) {
      e.preventDefault();
      return false;
    }
  });

  // Blur content when tab is hidden
  document.addEventListener('visibilitychange', function() {
    const main = document.querySelector('main');
    if (!main) return;

    if (document.hidden) {
      main.style.filter = 'blur(8px)';
    } else {
      main.style.filter = 'none';
    }
  });

  // Disable image long press on mobile
  document.querySelectorAll('img').forEach(function(img) {
    img.setAttribute('draggable', 'false');
    img.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
  });
</script>
